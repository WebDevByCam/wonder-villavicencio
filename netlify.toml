[build]
  publish = "dist"
  # generate the Nuxt site then include the static 'link' folder in the output
  command = "npm run generate && cp -r link dist/link"

# root path on link host should go to the static index
[[redirects]]
  from = "/"
  to = "/link/index.html"
  status = 200
  conditions = { Host = ["link.wondervillavicencio.com"] }

# all other paths on link host also serve from link folder
[[redirects]]
  from = "/*"
  to = "/link/:splat"
  status = 200
  conditions = { Host = ["link.wondervillavicencio.com"] }

# default redirect for the Nuxt app (main site)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = { Host = ["wondervillavicencio.com", "www.wondervillavicencio.com"] }
